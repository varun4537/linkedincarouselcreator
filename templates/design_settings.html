{% extends "base.html" %}

{% block title %}Design System Settings — CarouselCreator{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Design System Settings (design.md)</h1>
    <p>Directly edit and update the core design guidelines used by the LLM and the visual layout templates.</p>
</div>

<div class="glass-card">
    <form action="/design" method="POST">
        <div class="form-group" style="margin-bottom: 28px;">
            <label for="design_content">Design system guidelines content (Markdown format)</label>
            <textarea id="design_content" name="content" rows="22" style="font-family: monospace; font-size: 13.5px; line-height: 1.6; background-color: rgba(0, 0, 0, 0.35); border-color: var(--border-color); color: var(--text-primary); border-radius: 12px; padding: 20px;" placeholder="Paste design.md rules here..." required>{{ content }}</textarea>
        </div>

        <div class="btn-group" style="border-top: 1px solid var(--border-color); padding-top: 28px; margin-top: 20px;">
            <a href="/" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary" style="font-size: 16px; padding: 12px 36px;">Save Guidelines</button>
        </div>
    </form>
</div>
{% endblock %}
